# Static analysis configuration for the ReadMe.ai Flutter client.
# Builds on the recommended Flutter lint set with additional project rules.
include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat common correctness issues as errors so they fail CI, not just warn.
  errors:
    invalid_annotation_target: ignore # noisy with Freezed/json_serializable
    missing_required_param: error
    missing_return: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/l10n/generated/**"
    - "build/**"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # Style & consistency
    - always_declare_return_types
    - prefer_single_quotes
    - prefer_final_locals
    - prefer_const_constructors
    - prefer_const_declarations
    - directives_ordering
    - require_trailing_commas
    - sort_pub_dependencies
    # Safety
    - avoid_dynamic_calls
    - avoid_print
    - cancel_subscriptions
    - close_sinks
    - throw_in_finally
