name: Backend CI

# Scoped to backend paths so the two ecosystems build independently.
on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: apps/api

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: isort (import order check)
        run: isort --check-only .

      - name: mypy (static types)
        run: mypy app

      - name: pytest
        run: pytest

  build-image:
    name: Verify Docker image builds
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t readme-ai/api:ci apps/api
